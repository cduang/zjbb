name: Package and Release APKs

on:
  push:
    branches:
      - main 

permissions:
  contents: write # 必须具有写入权限才能创建 Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          # 打包文件
          zip -j output.zip AutoJS.fake.latest.apk KernelSU_v1.0.1.apk MT2.26.4.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 使用当前时间作为标签，保证唯一性，实现永久归档
          tag_name: build-${{ github.run_number }}
          name: APK存档-${{ github.run_number }}
          body: "自动打包的APK集合文件。"
          files: output.zip
          # 设置为 true 如果你想让这次打包变成一个正式的发行版
          draft: false
          prerelease: false
