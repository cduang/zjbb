name: Package and Release APKs

on:
  push:
    branches:
      - main 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Password Protected ZIP
        # 这里使用 env 将 secrets 传递给 shell 环境
        env:
          ZIP_PASS: ${{ secrets.ZIP_PASSWORD }}
        run: |
          # 使用环境变量 $ZIP_PASS 来替代明文密码
          zip -P "$ZIP_PASS" -j output.zip AutoJS.fake.latest.apk KernelSU_v1.0.1.apk MT2.26.4.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: 加密APK存档-${{ github.run_number }}
          # 不要在 body 里直接写明密码，避免泄露
          body: "已打包加密的 APK 文件。解压密码已存入配置。"
          files: output.zip
          draft: false
          prerelease: false
